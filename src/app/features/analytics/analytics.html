<div class="container">

  <h1>Аналитика</h1>

  <div class="cards">

    <mat-card class="card">
      <h2>Всего задач</h2>
      <h1>{{ total }}</h1>
    </mat-card>

    <mat-card class="card">
      <h2>Новые задачи</h2>
      <h1>{{ newTasks }}</h1>
    </mat-card>

    <mat-card class="card">
      <h2>В процессе</h2>
      <h1>{{ inProgress }}</h1>
    </mat-card>

    <mat-card class="card">
      <h2>Выполнено</h2>
      <h1>{{ completed }}</h1>
    </mat-card>

    <mat-card class="card">
      <h2>Процент выполнения</h2>
      <h1>{{ completedPercent }}%</h1>
    </mat-card>

  </div>

</div>
